<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neuroskill Registro</title>

  <!-- Fuente retro -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    
  </style>
</head>

<body>
  <div class="container">
    <h2>Registro de Usuario</h2>
    <form (ngSubmit)="registrarUsuario()">
      <label for="nombre">Nombre de Usuario:</label>
      <input
        type="text"
        id="nombre"
        [(ngModel)]="nuevoUsuario.nombre_usuario"
        name="nombre_usuario"
        required
      />

      <label for="correo">Correo:</label>
      <input
        type="email"
        id="correo"
        [(ngModel)]="nuevoUsuario.correo"
        name="correo"
        required
      />

      <label for="contrasena">Contraseña:</label>
      <input
        type="password"
        id="contrasena"
        [(ngModel)]="nuevoUsuario.contrasena"
        name="contrasena"
        required
      />

      <button type="submit">Registrar</button>
    </form>

    <p class="footer">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesión aquí</a>
    </p>
  </div>
</body>
</html>
